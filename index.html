<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jesus Reina - Suíte Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <canvas id="notification-canvas"></canvas>
    <div class="dynamic-verses-container"></div>

    <div id="central-alert-frame" class="hidden">
        <div class="central-alert-content-modern">
            <div class="header-alerta-modern">
                <i class="fas fa-bell pulse-icon"></i>
                <h3>ALERTA DE NOTIFICAÇÃO</h3>
            </div>
            
            <img id="central-alert-image" src="" alt="Capa da Notificação" class="central-capa-modern">
            
            <div id="central-alert-text" class="text-info-modern"></div>
            
            <div class="central-actions-row">
                <button id="central-stop-btn" class="btn-action-modern stop-neon">
                    <i class="fas fa-pause"></i> PARAR SOM
                </button>
                <button class="btn-action-modern home-neon" onclick="document.getElementById('central-alert-frame').classList.add('hidden')">
                    <i class="fas fa-home"></i> FECHAR
                </button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div id="side-menu" class="side-menu">
            <div class="menu-content">
                <div class="menu-header-side">
                    <h3>Agendar Evento</h3>
                    <button id="close-menu"><i class="fas fa-times"></i></button>
                </div>
                
                <div class="input-group">
                    <label>Título do Evento</label>
                    <input type="text" id="event-title" placeholder="Ex: Oração da Manhã">
                </div>

                <div class="input-group">
                    <label>Descrição</label>
                    <textarea id="event-desc" placeholder="Detalhes do lembrete..."></textarea>
                </div>

                <div class="input-row" style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex: 1;">
                        <label>Data Única</label>
                        <input type="date" id="event-date">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Hora</label>
                        <input type="time" id="event-time">
                    </div>
                </div>

                <div class="input-group">
                    <label>Repetir nos Dias:</label>
                    <div class="days-selector">
                        <label class="day-check"><input type="checkbox" value="0"> Dom</label>
                        <label class="day-check"><input type="checkbox" value="1"> Seg</label>
                        <label class="day-check"><input type="checkbox" value="2"> Ter</label>
                        <label class="day-check"><input type="checkbox" value="3"> Qua</label>
                        <label class="day-check"><input type="checkbox" value="4"> Qui</label>
                        <label class="day-check"><input type="checkbox" value="5"> Sex</label>
                        <label class="day-check"><input type="checkbox" value="6"> Sáb</label>
                    </div>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-music"></i> Som do Alerta (PC)</label>
                    <input type="file" id="event-sound" accept="audio/*" style="display: none;">
                    <button type="button" class="btn-upload-local" onclick="document.getElementById('event-sound').click()">
                        <i class="fas fa-upload"></i> Escolher Música
                    </button>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-image"></i> Capa da Notificação (PC)</label>
                    <input type="file" id="event-image" accept="image/*" style="display: none;">
                    <button type="button" class="btn-upload-local" onclick="document.getElementById('event-image').click()">
                        <i class="fas fa-camera"></i> Escolher Foto
                    </button>
                </div>

                <button id="save-event" class="btn-save">Agendar Agora</button>
            </div>
        </div>

        <header class="main-header">
            <div class="logo">
                <i class="fas fa-bell"></i>
                <span>Jesus <span>Reina</span></span>
            </div>
            <button id="clear-all" class="btn-secondary">Limpar Painel</button>
        </header>

        <main id="notification-area"></main>

        <div class="action-buttons">
            <button id="quick-stop" class="stop-btn-modern" onclick="desligarAlerta(this)">
                <i class="fas fa-pause"></i>
            </button>
            <button id="open-menu" class="fab-btn">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <footer></footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
