<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notify Pro - Suíte Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <div id="side-menu" class="side-menu">
            <div class="menu-content">
                <div class="menu-header">
                    <h3>Agendar Evento</h3>
                    <button id="close-menu"><i class="fas fa-times"></i></button>
                </div>
                
                <div class="input-group">
                    <label>Título do Evento</label>
                    <input type="text" id="event-title" placeholder="Ex: Aniversário do Joabe">
                </div>

                <div class="input-group">
                    <label>Descrição</label>
                    <textarea id="event-desc" placeholder="Detalhes ou lembretes..."></textarea>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Data Única</label>
                        <input type="date" id="event-date">
                    </div>
                    <div class="input-group">
                        <label>Hora</label>
                        <input type="time" id="event-time">
                    </div>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-calendar-alt"></i> Repetir nos Dias:</label>
                    <div class="days-selector">
                        <label class="day-check"><input type="checkbox" value="0"> Dom</label>
                        <label class="day-check"><input type="checkbox" value="1"> Seg</label>
                        <label class="day-check"><input type="checkbox" value="2"> Ter</label>
                        <label class="day-check"><input type="checkbox" value="3"> Qua</label>
                        <label class="day-check"><input type="checkbox" value="4"> Qui</label>
                        <label class="day-check"><input type="checkbox" value="5"> Sex</label>
                        <label class="day-check"><input type="checkbox" value="6"> Sáb</label>
                    </div>
                </div>

                <div class="input-group">
                    <label>Categoria</label>
                    <select id="event-category">
                        <option value="success">🎉 Festa / Evento</option>
                        <option value="warning">🎂 Aniversário</option>
                        <option value="error">⚠️ Urgente</option>
                    </select>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-image"></i> Capa da Notificação (Foto)</label>
                    <input type="file" id="event-image" accept="image/*">
                </div>

                <div class="input-group">
                    <label><i class="fas fa-music"></i> Som do Alerta (.mp3)</label>
                    <input type="file" id="event-sound" accept="audio/*">
                </div>

                <button id="save-event" class="btn-save">Agendar Agora</button>
            </div>
        </div>

        <header>
            <div class="logo">
                <i class="fas fa-bell"></i>
                <span>Notify<span>Pro</span></span>
            </div>
            <button id="clear-all" class="btn-secondary">Limpar Painel</button>
        </header>

        <main id="notification-area">
            </main>

        <button id="open-menu" class="fab-btn">
            <i class="fas fa-plus"></i>
        </button>

        <footer class="controls">
            <button onclick="sendNotify('success', 'Sistema', 'Monitoramento ativo.')" class="btn-action success">
                <i class="fas fa-microchip"></i>
            </button>
            <p>Aguardando eventos agendados...</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
