<script>
// ── CONFIG ─────────────────────────────────────────────────────────
const WINNING_SCORE = 7;
const DIFF = {
  easy:   { aiSpeed:3.5, aiReaction:0.55, ballSpeedMult:0.85, aiErrorRange:28 },
  medium: { aiSpeed:5.5, aiReaction:0.80, ballSpeedMult:1,    aiErrorRange:14 },
  hard:   { aiSpeed:8,   aiReaction:0.97, ballSpeedMult:1.15, aiErrorRange:4  },
};

// ── STATE ──────────────────────────────────────────────────────────
let gs = null, mode = '1p', difficulty = 'medium';
let animFrame = null, isPaused = false, gameRunning = false;
let keys = {}, scrollDelta = 0, aiTarget = null;

// ── AUDIO ──────────────────────────────────────────────────────────
let audioCtx = null;
function getCtx() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function beep(freq, dur, type='sine', vol=0.1) {
  const ctx = getCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + dur);
}
const snd = {
  hit: () => beep(440, 0.08, 'square', 0.1),
  wall: () => beep(300, 0.06, 'triangle', 0.08),
  score: () => { beep(523,0.15); setTimeout(()=>beep(659,0.15),100); setTimeout(()=>beep(784,0.2),200); },
  win: () => [523,659,784,1047].forEach((n,i)=>setTimeout(()=>beep(n,0.3),i*150)),
  start: () => { beep(330,0.1,'square',0.08); setTimeout(()=>beep(440,0.1,'square',0.08),120); setTimeout(()=>beep(660,0.15,'square',0.08),240); }
};

// ── MENU ──────────────────────────────────────────────────────────
function showDiff() {
  document.getElementById('mode-btns').style.display = 'none';
  document.getElementById('diff-step').classList.add('visible');
}
function hideDiff() {
  document.getElementById('diff-step').classList.remove('visible');
  document.getElementById('mode-btns').style.display = 'flex';
}

// ── BG CANVAS (menu cats) ──────────────────────────────────────────
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const EMOJIS = ['🐱','😺','😸','🐾','✨'];
  let cats = [];
  function mkCat(w,h) {
    return { x:Math.random()*w, y:h+Math.random()*200, speed:0.4+Math.random()*0.8,
      opacity:0.08+Math.random()*0.12, size:14+Math.random()*18,
      emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
      drift:(Math.random()-0.5)*0.3, wobble:Math.random()*Math.PI*2, wobbleSpeed:0.01+Math.random()*0.02 };
  }
  function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    if (!cats.length) for (let i=0;i<18;i++) { const c=mkCat(canvas.width,canvas.height); c.y=Math.random()*canvas.height; cats.push(c); }
  }
  resize(); window.addEventListener('resize', resize);
  let frame = 0;
  (function loop() {
    frame++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    cats.forEach(c => {
      c.y -= c.speed; c.wobble += c.wobbleSpeed; c.x += c.drift + Math.sin(c.wobble)*0.4;
      if (c.y < -50) Object.assign(c, mkCat(canvas.width, canvas.height));
      ctx.save(); ctx.globalAlpha = c.opacity; ctx.font = `${c.size}px serif`;
      ctx.textAlign = 'center'; ctx.fillText(c.emoji, c.x, c.y); ctx.restore();
    });
    if (frame % 120 === 0 && cats.length < 22) cats.push(mkCat(canvas.width, canvas.height));
    requestAnimationFrame(loop);
  })();
})();

// ── INIT GAME ─────────────────────────────────────────────────────
function initGame() {
  const canvas = document.getElementById('game-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const W = canvas.width, H = canvas.height;
  const cfg = DIFF[difficulty];
  const paddleW = Math.max(14, W * 0.022);
  const paddleH = H * 0.2;
  const ballR = Math.max(9, W * 0.013);

  const fieldParticles = [];
  for (let i=0;i<60;i++) {
    fieldParticles.push({ x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.4,
      r:Math.random()*2+0.5, alpha:Math.random(), alphaDir:Math.random()>0.5?1:-1,
      alphaSpeed:0.005+Math.random()*0.015,
      color:['rgba(0,200,255,','rgba(150,80,255,','rgba(0,255,160,','rgba(80,160,255,'][Math.floor(Math.random()*4)] });
  }
  const energyLines = [];
  for (let i=0;i<8;i++) {
    energyLines.push({ y:Math.random()*H, speed:0.3+Math.random()*0.7, alpha:0,
      color:Math.random()>0.5?'rgba(0,200,255,':'rgba(150,80,255,' });
  }

  gs = { W, H, paddleW, paddleH, ballR, cfg, margin: Math.max(20, W*0.025),
    p1:{ y:H/2-paddleH/2, score:0 }, p2:{ y:H/2-paddleH/2, score:0 },
    ball:{ x:W/2, y:H/2, vx:5*cfg.ballSpeedMult*(Math.random()>0.5?1:-1), vy:(Math.random()*4-2)*cfg.ballSpeedMult },
    trail:[], particles:[], fieldParticles, energyLines, scanY:0, pulsePhase:0,
    impactFlash:null, scoreFlash:null, paddleSpeed:7, gameOver:false };
}

function spawnParticles(x, y, color) {
  for (let i=0;i<20;i++) {
    const angle = Math.random()*Math.PI*2, speed = Math.random()*5+1;
    gs.particles.push({ x,y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      life:1, color, r:Math.random()*4+1 });
  }
  gs.impactFlash = { x, y, life:1, color };
}

function resetBall(scorer) {
  const dir = scorer === 'p1' ? 1 : -1;
  gs.ball.x = gs.W/2; gs.ball.y = gs.H/2;
  gs.ball.vx = 5 * gs.cfg.ballSpeedMult * dir;
  gs.ball.vy = (Math.random()*4-2) * gs.cfg.ballSpeedMult;
  gs.trail = []; aiTarget = null;
}

// ── UPDATE ────────────────────────────────────────────────────────
function update() {
  if (!gs || gs.gameOver) return;
  const {W, H, paddleW, paddleH, ballR, ball, p1, p2, paddleSpeed, margin, cfg} = gs;

  // Scan & pulse
  gs.scanY = (gs.scanY + 1.2) % H;
  gs.pulsePhase += 0.04;

  // Field particles
  gs.fieldParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    p.alpha += p.alphaDir * p.alphaSpeed;
    if (p.alpha >= 1) { p.alpha=1; p.alphaDir=-1; }
    if (p.alpha <= 0) { p.alpha=0; p.alphaDir=1; }
  });
  gs.energyLines.forEach(l => {
    l.y += l.speed;
    if (l.y > H+10) { l.y = -10; l.alpha = 0; }
    l.alpha = Math.sin(l.y / H * Math.PI) * 0.4;
  });

  // Trail
  gs.trail.push({x:ball.x, y:ball.y, life:1});
  if (gs.trail.length > 35) gs.trail.shift();
  gs.trail.forEach(t => t.life -= 0.03);
  gs.trail = gs.trail.filter(t => t.life > 0);

  // Particles
  gs.particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=0.96; p.vy*=0.96; p.life-=0.025; });
  gs.particles = gs.particles.filter(p => p.life > 0);
  if (gs.impactFlash) { gs.impactFlash.life -= 0.1; if (gs.impactFlash.life<=0) gs.impactFlash=null; }
  if (gs.scoreFlash) { gs.scoreFlash.life -= 0.04; if (gs.scoreFlash.life<=0) gs.scoreFlash=null; }

  // Scroll
  if (scrollDelta !== 0) { p1.y = Math.max(0, Math.min(H-paddleH, p1.y+scrollDelta)); scrollDelta=0; }

  // P1 controls
  if (mode==='2p') {
    if (keys['w']||keys['W']) p1.y = Math.max(0, p1.y-paddleSpeed);
    if (keys['s']||keys['S']) p1.y = Math.min(H-paddleH, p1.y+paddleSpeed);
    if (keys['ArrowUp']) p2.y = Math.max(0, p2.y-paddleSpeed);
    if (keys['ArrowDown']) p2.y = Math.min(H-paddleH, p2.y+paddleSpeed);
  } else {
    if (keys['w']||keys['W']||keys['ArrowUp']) p1.y = Math.max(0, p1.y-paddleSpeed);
    if (keys['s']||keys['S']||keys['ArrowDown']) p1.y = Math.min(H-paddleH, p1.y+paddleSpeed);
    // AI
    let predictedY = ball.y;
    if (ball.vx > 0) {
      const distX = (W - margin - paddleW) - ball.x;
      const timeToReach = distX / ball.vx;
      let py = ball.y + ball.vy * timeToReach;
      const bounces = Math.floor(Math.abs(py) / H);
      py = Math.abs(py % H);
      if (bounces % 2 === 1) py = H - py;
      if (aiTarget === null) aiTarget = py + (Math.random()-0.5)*2*cfg.aiErrorRange;
      predictedY = aiTarget;
    } else { aiTarget = null; predictedY = H/2; }
    const targetY = predictedY - paddleH/2;
    const diff = targetY - p2.y;
    const move = Math.min(Math.abs(diff), cfg.aiSpeed) * Math.sign(diff) * cfg.aiReaction;
    p2.y = Math.max(0, Math.min(H-paddleH, p2.y+move));
  }

  // Ball
  ball.x += ball.vx; ball.y += ball.vy;
  if (ball.y-ballR<=0) { ball.y=ballR; ball.vy=-ball.vy; snd.wall(); }
  if (ball.y+ballR>=H) { ball.y=H-ballR; ball.vy=-ball.vy; snd.wall(); }

  // P1 paddle hit
  if (ball.vx<0 && ball.x-ballR<=margin+paddleW && ball.x-ballR>=margin && ball.y>=p1.y && ball.y<=p1.y+paddleH) {
    ball.x = margin+paddleW+ballR;
    const rel = (ball.y-(p1.y+paddleH/2))/(paddleH/2);
    ball.vx = -ball.vx*1.05; ball.vy = rel*6*cfg.ballSpeedMult;
    ball.vx = Math.min(Math.abs(ball.vx),14)*Math.sign(ball.vx);
    snd.hit(); spawnParticles(ball.x, ball.y, 'hsl(160,100%,50%)');
  }
  // P2 paddle hit
  if (ball.vx>0 && ball.x+ballR>=W-margin-paddleW && ball.x+ballR<=W-margin && ball.y>=p2.y && ball.y<=p2.y+paddleH) {
    ball.x = W-margin-paddleW-ballR;
    const rel = (ball.y-(p2.y+paddleH/2))/(paddleH/2);
    ball.vx = -ball.vx*1.05; ball.vy = rel*6*cfg.ballSpeedMult;
    ball.vx = Math.min(Math.abs(ball.vx),14)*Math.sign(ball.vx);
    snd.hit(); spawnParticles(ball.x, ball.y, 'hsl(190,100%,50%)');
  }

  // Score
  if (ball.x-ballR < 0) {
    p2.score++; snd.score(); gs.scoreFlash={player:'p2',life:1};
    updateScore();
    if (p2.score >= WINNING_SCORE) { gs.gameOver=true; snd.win(); showWinner('p2'); return; }
    resetBall('p2');
  }
  if (ball.x+ballR > W) {
    p1.score++; snd.score(); gs.scoreFlash={player:'p1',life:1};
    updateScore();
    if (p1.score >= WINNING_SCORE) { gs.gameOver=true; snd.win(); showWinner('p1'); return; }
    resetBall('p1');
  }
}

// ── DRAW ──────────────────────────────────────────────────────────
function draw() {
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  if (!gs) return;
  const {W, H, paddleW, paddleH, ballR, ball, p1, p2, margin} = gs;
  const pulse = Math.sin(gs.pulsePhase)*0.5+0.5;

  // BG
  const bg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.9);
  bg.addColorStop(0,'#0a1228'); bg.addColorStop(0.5,'#07101f'); bg.addColorStop(1,'#030609');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Field particles
  ctx.save();
  gs.fieldParticles.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`${p.color}${(p.alpha*0.7).toFixed(2)})`; ctx.fill();
  });
  ctx.restore();

  // Energy lines
  ctx.save();
  gs.energyLines.forEach(l => {
    if (l.alpha<=0.01) return;
    const lg = ctx.createLinearGradient(0,l.y-1,0,l.y+1);
    lg.addColorStop(0,'rgba(0,0,0,0)');
    lg.addColorStop(0.5,`${l.color}${l.alpha.toFixed(2)})`);
    lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lg; ctx.fillRect(0,l.y-1,W,3);
  });
  // Scan
  const sg = ctx.createLinearGradient(0,gs.scanY-6,0,gs.scanY+6);
  sg.addColorStop(0,'rgba(0,200,255,0)');
  sg.addColorStop(0.5,`rgba(0,200,255,${(0.06+pulse*0.04).toFixed(3)})`);
  sg.addColorStop(1,'rgba(0,200,255,0)');
  ctx.fillStyle=sg; ctx.fillRect(0,gs.scanY-6,W,12);
  ctx.restore();

  // Score flash
  if (gs.scoreFlash && gs.scoreFlash.life>0) {
    const a=gs.scoreFlash.life*0.22;
    ctx.fillStyle=gs.scoreFlash.player==='p1'?`rgba(0,255,170,${a})`:`rgba(120,80,255,${a})`;
    ctx.fillRect(0,0,W,H);
  }

  // Border glow
  const bp = 0.12+pulse*0.08;
  for (let i=5;i>=1;i--) {
    const bg2 = ctx.createLinearGradient(0,0,W,H);
    bg2.addColorStop(0,`rgba(0,255,170,${bp*i*0.5})`);
    bg2.addColorStop(0.3,`rgba(0,200,255,${bp*i*0.6})`);
    bg2.addColorStop(0.6,`rgba(120,80,255,${bp*i*0.6})`);
    bg2.addColorStop(1,`rgba(0,255,170,${bp*i*0.5})`);
    ctx.strokeStyle=bg2; ctx.lineWidth=i*2.5;
    ctx.strokeRect(3,3,W-6,H-6);
  }

  // Vignette
  const vig = ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,W*0.7);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.35)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  // Center line
  const cla = 0.25+pulse*0.15;
  ctx.save(); ctx.shadowColor='rgba(0,200,255,0.8)'; ctx.shadowBlur=12+pulse*8;
  ctx.setLineDash([H*0.045,H*0.022]);
  ctx.strokeStyle=`rgba(0,200,255,${cla})`; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  // Center circle
  const circR = Math.min(W,H)*0.1;
  ctx.save(); ctx.shadowColor='rgba(0,200,255,0.7)'; ctx.shadowBlur=16+pulse*10;
  ctx.beginPath(); ctx.arc(W/2,H/2,circR,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,200,255,${0.2+pulse*0.15})`; ctx.lineWidth=2.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2,H/2,circR*0.35,0,Math.PI*2);
  ctx.strokeStyle=`rgba(150,80,255,${0.15+pulse*0.1})`; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();

  // Goal glows
  const lg1 = ctx.createLinearGradient(0,0,W*0.06,0);
  lg1.addColorStop(0,`rgba(0,255,160,${0.04+pulse*0.03})`); lg1.addColorStop(1,'rgba(0,255,160,0)');
  ctx.fillStyle=lg1; ctx.fillRect(0,0,W*0.06,H);
  const lg2 = ctx.createLinearGradient(W,0,W*0.94,0);
  lg2.addColorStop(0,`rgba(150,80,255,${0.04+pulse*0.03})`); lg2.addColorStop(1,'rgba(150,80,255,0)');
  ctx.fillStyle=lg2; ctx.fillRect(W*0.94,0,W*0.06,H);

  // Trail
  gs.trail.forEach(t => {
    const r = ballR*t.life*1.1;
    const tg = ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,r);
    tg.addColorStop(0,`rgba(100,255,220,${t.life*0.65})`);
    tg.addColorStop(0.5,`rgba(0,200,255,${t.life*0.3})`);
    tg.addColorStop(1,'rgba(0,200,255,0)');
    ctx.beginPath(); ctx.arc(t.x,t.y,r,0,Math.PI*2); ctx.fillStyle=tg; ctx.fill();
  });

  // Impact flash
  if (gs.impactFlash && gs.impactFlash.life>0) {
    const {x,y,life,color} = gs.impactFlash;
    const fr = ballR*6*(1-life*0.2);
    const fg = ctx.createRadialGradient(x,y,0,x,y,fr);
    fg.addColorStop(0,color.replace('hsl','hsla').replace(')',`,${life*0.7})`));
    fg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(x,y,fr,0,Math.PI*2); ctx.fillStyle=fg; ctx.fill();
  }

  // Particles
  gs.particles.forEach(p => {
    const pg = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*p.life);
    pg.addColorStop(0,p.color.replace('hsl','hsla').replace(')',`,${p.life})`));
    pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fillStyle=pg; ctx.fill();
  });

  // Paddle draw helper
  function drawPaddle(x, y, col1, col2, col3, shadowCol) {
    const pw=paddleW, ph=paddleH;
    for (let g=5;g>=1;g--) {
      ctx.shadowColor=shadowCol; ctx.shadowBlur=g*12;
      ctx.beginPath(); ctx.roundRect(x,y,pw,ph,pw/2);
      const pg = ctx.createLinearGradient(x,y,x,y+ph);
      pg.addColorStop(0,`${col1}${(0.18*g*(0.8+pulse*0.2)).toFixed(3)})`);
      pg.addColorStop(1,`${col2}${(0.1*g).toFixed(3)})`);
      ctx.fillStyle=pg; ctx.fill();
    }
    ctx.shadowColor=shadowCol; ctx.shadowBlur=25;
    const mg = ctx.createLinearGradient(x,y,x+pw,y+ph);
    mg.addColorStop(0,col3[0]); mg.addColorStop(0.4,col3[1]); mg.addColorStop(1,col3[2]);
    ctx.fillStyle=mg; ctx.beginPath(); ctx.roundRect(x,y,pw,ph,pw/2); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.roundRect(x+pw*0.2,y+ph*0.06,pw*0.35,ph*0.32,pw*0.15); ctx.fill();
  }

  drawPaddle(margin, p1.y,
    'rgba(0,255,160,', 'rgba(0,200,120,', ['#afffdc','#00ffaa','#00bb77'], 'rgba(0,255,150,1)');
  drawPaddle(W-margin-paddleW, p2.y,
    'rgba(140,80,255,', 'rgba(80,160,255,', ['#e0b0ff','#a050ff','#5080ff'], 'rgba(150,80,255,1)');

  // Ball
  for (let g=5;g>=1;g--) {
    ctx.beginPath(); ctx.arc(ball.x,ball.y,ballR+g*6,0,Math.PI*2);
    const rg = ctx.createRadialGradient(ball.x,ball.y,ballR*0.5,ball.x,ball.y,ballR+g*6);
    rg.addColorStop(0,`rgba(200,255,240,${0.07*g})`); rg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg; ctx.fill();
  }
  ctx.shadowColor='rgba(180,255,230,1)'; ctx.shadowBlur=35;
  const ballG = ctx.createRadialGradient(ball.x-ballR*0.3,ball.y-ballR*0.3,0,ball.x,ball.y,ballR);
  ballG.addColorStop(0,'#ffffff'); ballG.addColorStop(0.4,'#c0ffee'); ballG.addColorStop(1,'#40ffcc');
  ctx.fillStyle=ballG; ctx.beginPath(); ctx.arc(ball.x,ball.y,ballR,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.beginPath(); ctx.arc(ball.x-ballR*0.3,ball.y-ballR*0.35,ballR*0.28,0,Math.PI*2); ctx.fill();
}

// ── LOOP ──────────────────────────────────────────────────────────
function loop() {
  if (!isPaused) update();
  draw();
  animFrame = requestAnimationFrame(loop);
}

// ── CONTROLS ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'Escape' && gameRunning) togglePause();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
window.addEventListener('wheel', e => {
  if (!gameRunning) return;
  e.preventDefault();
  scrollDelta += Math.sign(e.deltaY) * Math.min(Math.abs(e.deltaY)*0.6, 18);
}, { passive: false });

document.getElementById('game-canvas').addEventListener('touchmove', e => {
  e.preventDefault();
  if (!gs) return;
  for (const t of e.touches) {
    const rect = e.target.getBoundingClientRect();
    const y = t.clientY - rect.top, x = t.clientX - rect.left;
    if (mode==='2p') {
      if (x < gs.W/2) gs.p1.y = Math.max(0,Math.min(gs.H-gs.paddleH,y-gs.paddleH/2));
      else gs.p2.y = Math.max(0,Math.min(gs.H-gs.paddleH,y-gs.paddleH/2));
    } else {
      gs.p1.y = Math.max(0,Math.min(gs.H-gs.paddleH,y-gs.paddleH/2));
    }
  }
}, { passive: false });
document.getElementById('game-canvas').addEventListener('touchstart', e => {
  e.preventDefault();
  if (!gs) return;
  for (const t of e.touches) {
    const rect = e.target.getBoundingClientRect();
    const y = t.clientY - rect.top;
    gs.p1.y = Math.max(0,Math.min(gs.H-gs.paddleH,y-gs.paddleH/2));
  }
}, { passive: false });

window.addEventListener('resize', () => {
  if (!gameRunning || !gs) return;
  const canvas = document.getElementById('game-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  // rescale positions
  const scaleX = window.innerWidth / gs.W, scaleY = window.innerHeight / gs.H;
  gs.W = window.innerWidth; gs.H = window.innerHeight;
  gs.margin = Math.max(20, gs.W*0.025);
  gs.paddleW = Math.max(14, gs.W*0.022);
  gs.paddleH = gs.H*0.2;
  gs.ballR = Math.max(9, gs.W*0.013);
  gs.p1.y *= scaleY; gs.p2.y *= scaleY;
  gs.ball.x *= scaleX; gs.ball.y *= scaleY;
});

// ── UI HELPERS ────────────────────────────────────────────────────
function updateScore() {
  document.getElementById('score-p1').textContent = gs.p1.score;
  document.getElementById('score-p2').textContent = gs.p2.score;
}

function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pause-btn').textContent = isPaused ? '▶' : '⏸';
  document.getElementById('pause-overlay').classList.toggle('visible', isPaused);
}

function showWinner(winner) {
  const p1Label = 'JOGADOR 1', p2Label = mode==='1p'?'IA':'JOGADOR 2';
  const name = winner==='p1' ? p1Label : p2Label;
  const color = winner==='p1' ? '#00ffaa' : '#a050ff';
  const glow = winner==='p1' ? 'rgba(0,255,160,0.3)' : 'rgba(150,80,255,0.3)';
  const btnColor = winner==='p1' ? 'linear-gradient(135deg,#00ffaa,#00cc88)' : 'linear-gradient(135deg,#a050ff,#5080ff)';
  document.getElementById('winner-name').textContent = name;
  document.getElementById('winner-name').style.color = color;
  document.getElementById('winner-name').style.textShadow = `0 0 30px ${glow.replace('0.3','0.7')}`;
  document.getElementById('winner-score').textContent = `${gs.p1.score} — ${gs.p2.score}`;
  document.getElementById('winner-btn').style.background = btnColor;
  document.getElementById('winner-box').style.border = `1px solid ${glow}`;
  document.getElementById('winner-overlay').classList.add('visible');
}

function startGame(m, diff) {
  mode = m; difficulty = diff;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('game').classList.add('visible');
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('hint').style.display = 'block';
  document.getElementById('hint').textContent = mode==='2p'
    ? 'P1: W/S  •  P2: ↑/↓  •  ESC: Pausar'
    : 'W/S · ↑/↓ · Scroll · Toque  •  ESC: Pausar';
  document.getElementById('p2name').textContent = mode==='1p'?'IA':'JOGADOR 2';
  document.getElementById('winner-overlay').classList.remove('visible');
  document.getElementById('pause-overlay').classList.remove('visible');
  isPaused = false; gameRunning = true;
  if (animFrame) cancelAnimationFrame(animFrame);
  initGame();
  snd.start();
  loop();
}

function quitGame() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame=null; }
  gameRunning = false; gs = null;
  document.getElementById('game').classList.remove('visible');
  document.getElementById('hud').style.display = 'none';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('hint').style.display = 'none';
  document.getElementById('winner-overlay').classList.remove('visible');
  document.getElementById('pause-overlay').classList.remove('visible');
  document.getElementById('menu').style.display = 'flex';
  hideDiff(); document.getElementById('mode-btns').style.display = 'flex';
}
</script>
