<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>SPACE CAT PONG 🐱🌌</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 100vw; height: 100vh; overflow: hidden; background: #02040a; font-family: 'Orbitron', sans-serif; }
  
  #hud {
    position: fixed; top: 20px; width: 100%; display: flex; justify-content: center;
    z-index: 10; pointer-events: none;
  }
  .score-box {
    background: rgba(5, 10, 25, 0.85); padding: 15px 40px; border-radius: 15px;
    border: 2px solid #00f2ff; display: flex; gap: 30px; align-items: center;
    box-shadow: 0 0 25px rgba(0, 242, 255, 0.4); backdrop-filter: blur(5px);
  }
  .score { font-size: 40px; color: #fff; text-shadow: 0 0 15px #00f2ff; }
  
  #menu {
    position: fixed; inset: 0; background: radial-gradient(circle, #0a1228 0%, #02040a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
  }
  .btn {
    padding: 20px 40px; font-family: inherit; font-size: 22px; cursor: pointer;
    background: transparent; color: #00f2ff; border: 2px solid #00f2ff;
    border-radius: 12px; transition: 0.3s; margin-top: 25px;
  }
  .btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 40px #00f2ff; transform: scale(1.05); }
  
  canvas { display: block; }
</style>
</head>
<body>

<div id="menu">
  <h1 style="color: #fff; font-size: clamp(40px, 8vw, 70px); text-align: center; line-height: 1;">
    SPACE CAT<br><span style="color: #b200ff; filter: drop-shadow(0 0 10px #b200ff);">GALAXY PONG</span>
  </h1>
  <button class="btn" onclick="startGame()">ENTRAR NO HIPERESPAÇO</button>
</div>

<div id="hud" style="display:none">
  <div class="score-box">
    <div id="p1-score" class="score">0</div>
    <div style="color: #666; font-size: 20px;">VS</div>
    <div id="p2-score" class="score">0</div>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameRunning = false;
let p1Score = 0, p2Score = 0;

// Configurações visuais
const paddleW = 35, paddleH = 110;
const goalSize = 200; 
const player = { x: 60, y: 0, color: '#00f2ff' };
const ai = { x: 0, y: 0, color: '#b200ff' };
const ball = { x: 0, y: 0, vx: 8, vy: 8, radius: 15 };

// Elementos do Universo
let stars = [];
let galaxyParticles = [];

function init() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  player.y = canvas.height / 2 - paddleH / 2;
  ai.y = canvas.height / 2 - paddleH / 2;
  ai.x = canvas.width - 60 - paddleW;
  
  // Criar estrelas de fundo
  stars = [];
  for(let i=0; i<200; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2,
      speed: Math.random() * 0.5,
      opacity: Math.random()
    });
  }

  // Criar partículas da Galáxia
  galaxyParticles = [];
  for(let i=0; i<150; i++) {
    galaxyParticles.push({
      angle: Math.random() * Math.PI * 2,
      radius: Math.random() * 120,
      speed: 0.01 + Math.random() * 0.02,
      color: Math.random() > 0.5 ? '#00f2ff' : '#b200ff',
      pSize: Math.random() * 3
    });
  }
  resetBall();
}

function resetBall() {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.vx = 8 * (Math.random() > 0.5 ? 1 : -1);
  ball.vy = 6 * (Math.random() > 0.5 ? 1 : -1);
}

function drawBackground() {
  // Fundo degradê profundo
  const bgGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
  bgGrad.addColorStop(0, '#0a1228');
  bgGrad.addColorStop(1, '#02040a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Estrelas animadas
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
    s.x -= s.speed; // Movimento sutil para a esquerda
    if(s.x < 0) s.x = canvas.width;
  });
}

function drawGalaxy() {
  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  
  // Brilho central
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 80);
  glow.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
  glow.addColorStop(0.4, 'rgba(178, 0, 255, 0.3)');
  glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, 80, 0, Math.PI*2);
  ctx.fill();

  // Partículas giratórias
  galaxyParticles.forEach(p => {
    p.angle += p.speed;
    const x = Math.cos(p.angle) * p.radius;
    const y = Math.sin(p.angle) * (p.radius * 0.6); // Galáxia inclinada
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 10;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(x, y, p.pSize, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();
}

function drawCat(x, y, color) {
  ctx.save();
  ctx.shadowBlur = 20;
  ctx.shadowColor = color;
  ctx.fillStyle = color;
  
  // Corpo pílula neon
  ctx.beginPath();
  ctx.roundRect(x, y, paddleW, paddleH, 18);
  ctx.fill();
  
  // Orelhas pontudas
  ctx.beginPath();
  ctx.moveTo(x + 5, y);
  ctx.lineTo(x + 12, y - 12);
  ctx.lineTo(x + 20, y);
  ctx.fill();
  
  ctx.beginPath();
  ctx.moveTo(x + paddleW - 5, y);
  ctx.lineTo(x + paddleW - 12, y - 12);
  ctx.lineTo(x + paddleW - 20, y);
  ctx.fill();

  // Detalhes da face
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.arc(x + 10, y + 25, 3.5, 0, Math.PI * 2);
  ctx.arc(x + paddleW - 10, y + 25, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBall() {
  // Rastro da estrela
  ctx.save();
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#00f2ff';
  
  // Desenho da Estrela
  let rot = Math.PI / 2 * 3;
  let step = Math.PI / 5;
  ctx.beginPath();
  ctx.moveTo(ball.x, ball.y - 18);
  for (let i = 0; i < 5; i++) {
    ctx.lineTo(ball.x + Math.cos(rot) * 18, ball.y + Math.sin(rot) * 18);
    rot += step;
    ctx.lineTo(ball.x + Math.cos(rot) * 8, ball.y + Math.sin(rot) * 8);
    rot += step;
  }
  ctx.fillStyle = "#fff";
  ctx.fill();
  ctx.restore();
}

function update() {
  if (!gameRunning) return;

  ball.x += ball.vx;
  ball.y += ball.vy;

  if (ball.y < 0 || ball.y > canvas.height) ball.vy *= -1;

  const goalTop = (canvas.height / 2) - (goalSize / 2);
  const goalBottom = (canvas.height / 2) + (goalSize / 2);

  // Colisão com laterais e Gols
  if (ball.x < 25) {
    if (ball.y > goalTop && ball.y < goalBottom) {
      p2Score++; resetBall();
    } else { ball.vx *= -1; ball.x = 25; }
  }
  if (ball.x > canvas.width - 25) {
    if (ball.y > goalTop && ball.y < goalBottom) {
      p1Score++; resetBall();
    } else { ball.vx *= -1; ball.x = canvas.width - 25; }
  }

  // Colisão Raquetes
  if (ball.vx < 0 && ball.x < player.x + paddleW && ball.y > player.y && ball.y < player.y + paddleH) {
    ball.vx *= -1.1; ball.x = player.x + paddleW;
  }
  if (ball.vx > 0 && ball.x > ai.x - ball.radius && ball.y > ai.y && ball.y < ai.y + paddleH) {
    ball.vx *= -1.1; ball.x = ai.x - ball.radius;
  }

  // Movimento IA (Suave)
  const aiCenter = ai.y + (paddleH / 2);
  if (aiCenter < ball.y - 30) ai.y += 7;
  else if (aiCenter > ball.y + 30) ai.y -= 7;

  document.getElementById('p1-score').innerText = p1Score;
  document.getElementById('p2-score').innerText = p2Score;
}

function draw() {
  drawBackground();
  drawGalaxy();

  // Gols Laterais Neon
  ctx.lineWidth = 6;
  const goalTop = (canvas.height / 2) - (goalSize / 2);
  const goalBottom = (canvas.height / 2) + (goalSize / 2);

  ctx.strokeStyle = '#00f2ff';
  ctx.beginPath();
  ctx.moveTo(15, 0); ctx.lineTo(15, goalTop);
  ctx.moveTo(15, goalBottom); ctx.lineTo(15, canvas.height);
  ctx.stroke();

  ctx.strokeStyle = '#b200ff';
  ctx.beginPath();
  ctx.moveTo(canvas.width - 15, 0); ctx.lineTo(canvas.width - 15, goalTop);
  ctx.moveTo(canvas.width - 15, goalBottom); ctx.lineTo(canvas.width - 15, canvas.height);
  ctx.stroke();

  drawCat(player.x, player.y, player.color);
  drawCat(ai.x, ai.y, ai.color);
  drawBall();

  update();
  requestAnimationFrame(draw);
}

function startGame() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  gameRunning = true;
  init();
  draw();
}

window.addEventListener('mousemove', (e) => {
  player.y = e.clientY - (paddleH / 2);
});

window.addEventListener('touchmove', (e) => {
  e.preventDefault();
  player.y = e.touches[0].clientY - (paddleH / 2);
}, {passive: false});

window.addEventListener('resize', init);
</script>
</body>
</html>
