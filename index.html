<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>SPACE CAT PONG 🐱⭐</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 100vw; height: 100vh; overflow: hidden; background: #02040a; font-family: 'Orbitron', sans-serif; }
  
  #hud {
    position: fixed; top: 20px; width: 100%; display: flex; justify-content: center;
    z-index: 10; pointer-events: none;
  }
  .score-box {
    background: rgba(10, 15, 30, 0.8); padding: 15px 40px; border-radius: 15px;
    border: 2px solid #00f2ff; display: flex; gap: 30px; align-items: center;
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
  }
  .score { font-size: 40px; color: #fff; text-shadow: 0 0 10px #00f2ff; }
  
  #menu {
    position: fixed; inset: 0; background: rgba(2, 4, 10, 0.95);
    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
  }
  .btn {
    padding: 20px 40px; font-family: inherit; font-size: 20px; cursor: pointer;
    background: transparent; color: #00f2ff; border: 2px solid #00f2ff;
    border-radius: 10px; transition: 0.3s; margin-top: 20px;
  }
  .btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 30px #00f2ff; }
  
  canvas { display: block; }
</style>
</head>
<body>

<div id="menu">
  <h1 style="color: #fff; font-size: 60px; text-align: center;">SPACE CAT<br><span style="color: #b200ff;">PONG</span></h1>
  <button class="btn" onclick="startGame()">INICIAR BATALHA</button>
</div>

<div id="hud" style="display:none">
  <div class="score-box">
    <div id="p1-score" class="score">0</div>
    <div style="color: #666;">VS</div>
    <div id="p2-score" class="score">0</div>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameRunning = false;
let p1Score = 0;
let p2Score = 0;

// Configurações
const paddleW = 30;
const paddleH = 100;
const goalSize = 180; // Tamanho do "buraco" do gol

const player = { x: 50, y: 0, color: '#00f2ff' };
const ai = { x: 0, y: 0, color: '#b200ff' };
const ball = { x: 0, y: 0, vx: 7, vy: 7, radius: 15 };

function init() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  player.y = canvas.height / 2 - paddleH / 2;
  ai.y = canvas.height / 2 - paddleH / 2;
  ai.x = canvas.width - 50 - paddleW;
  resetBall();
}

function resetBall() {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.vx = 7 * (Math.random() > 0.5 ? 1 : -1);
  ball.vy = 5 * (Math.random() > 0.5 ? 1 : -1);
}

// Desenha gatinho (Paddle)
function drawCat(x, y, color) {
  ctx.save();
  ctx.shadowBlur = 15;
  ctx.shadowColor = color;
  ctx.fillStyle = color;
  
  // Corpo (pílula)
  ctx.beginPath();
  ctx.roundRect(x, y, paddleW, paddleH, 15);
  ctx.fill();
  
  // Orelhas
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + 10, y - 10);
  ctx.lineTo(x + 20, y);
  ctx.fill();
  
  ctx.beginPath();
  ctx.moveTo(x + paddleW, y);
  ctx.lineTo(x + paddleW - 10, y - 10);
  ctx.lineTo(x + paddleW - 20, y);
  ctx.fill();
  
  // Olhos
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x + 10, y + 25, 3, 0, Math.PI * 2);
  ctx.arc(x + paddleW - 10, y + 25, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
  let rot = Math.PI / 2 * 3;
  let x = cx;
  let y = cy;
  let step = Math.PI / spikes;

  ctx.beginPath();
  ctx.moveTo(cx, cy - outerRadius);
  for (let i = 0; i < spikes; i++) {
    x = cx + Math.cos(rot) * outerRadius;
    y = cy + Math.sin(rot) * outerRadius;
    ctx.lineTo(x, y);
    rot += step;
    x = cx + Math.cos(rot) * innerRadius;
    y = cy + Math.sin(rot) * innerRadius;
    ctx.lineTo(x, y);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerRadius);
  ctx.closePath();
  ctx.fillStyle = "#fff";
  ctx.shadowBlur = 20;
  ctx.shadowColor = "#00f2ff";
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawGalaxy() {
  const time = Date.now() * 0.002;
  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.rotate(time * 0.2);
  for (let i = 0; i < 50; i++) {
    const angle = i * 0.5;
    const dist = i * 4;
    const x = Math.cos(angle) * dist;
    const y = Math.sin(angle) * dist;
    ctx.fillStyle = i % 2 === 0 ? '#b200ff' : '#00f2ff';
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function update() {
  if (!gameRunning) return;

  ball.x += ball.vx;
  ball.y += ball.vy;

  // Colisão teto/chão
  if (ball.y < 0 || ball.y > canvas.height) ball.vy *= -1;

  // Lógica de Gol (Buraco retangular)
  const goalTop = (canvas.height / 2) - (goalSize / 2);
  const goalBottom = (canvas.height / 2) + (goalSize / 2);

  // Linha da esquerda
  if (ball.x < 20) {
    if (ball.y > goalTop && ball.y < goalBottom) {
      p2Score++;
      resetBall();
    } else {
      ball.vx *= -1;
      ball.x = 20;
    }
  }

  // Linha da direita
  if (ball.x > canvas.width - 20) {
    if (ball.y > goalTop && ball.y < goalBottom) {
      p1Score++;
      resetBall();
    } else {
      ball.vx *= -1;
      ball.x = canvas.width - 20;
    }
  }

  // Colisão Raquetes
  if (ball.vx < 0 && ball.x < player.x + paddleW && ball.y > player.y && ball.y < player.y + paddleH) {
    ball.vx *= -1.1;
    ball.x = player.x + paddleW;
  }
  if (ball.vx > 0 && ball.x > ai.x - ball.radius && ball.y > ai.y && ball.y < ai.y + paddleH) {
    ball.vx *= -1.1;
    ball.x = ai.x - ball.radius;
  }

  // Movimento IA
  const aiCenter = ai.y + (paddleH / 2);
  if (aiCenter < ball.y - 35) ai.y += 6;
  else if (aiCenter > ball.y + 35) ai.y -= 6;

  document.getElementById('p1-score').innerText = p1Score;
  document.getElementById('p2-score').innerText = p2Score;
}

function draw() {
  ctx.fillStyle = '#02040a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawGalaxy();

  // Desenhar bordas com buraco (Gols)
  ctx.strokeStyle = '#00f2ff';
  ctx.lineWidth = 4;
  const goalTop = (canvas.height / 2) - (goalSize / 2);
  const goalBottom = (canvas.height / 2) + (goalSize / 2);

  // Borda Esquerda (com buraco)
  ctx.beginPath();
  ctx.moveTo(10, 0); ctx.lineTo(10, goalTop);
  ctx.moveTo(10, goalBottom); ctx.lineTo(10, canvas.height);
  ctx.stroke();

  // Borda Direita (com buraco)
  ctx.strokeStyle = '#b200ff';
  ctx.beginPath();
  ctx.moveTo(canvas.width - 10, 0); ctx.lineTo(canvas.width - 10, goalTop);
  ctx.moveTo(canvas.width - 10, goalBottom); ctx.lineTo(canvas.width - 10, canvas.height);
  ctx.stroke();

  drawCat(player.x, player.y, player.color);
  drawCat(ai.x, ai.y, ai.color);
  drawStar(ball.x, ball.y, 5, 15, 7);

  update();
  requestAnimationFrame(draw);
}

function startGame() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  gameRunning = true;
  init();
  draw();
}

// Controles
window.addEventListener('mousemove', (e) => {
  player.y = e.clientY - (paddleH / 2);
});

window.addEventListener('touchmove', (e) => {
  player.y = e.touches[0].clientY - (paddleH / 2);
});

window.addEventListener('resize', init);
</script>
</body>
</html>
